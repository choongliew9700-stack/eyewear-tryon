<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>实时虚拟试戴眼镜</title>
<style>
  :root{
    --bg:#ffffff; --gold:#b8860b; --gold-soft:#a8782e;
    --panel:#f5f5f5; --line:#dddddd; --text:#1a1a1a; --muted:#666666;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; overflow-y:auto;}
  #app{position:relative; width:100%; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px 0;}

  .stage{display:none; width:100%; flex-direction:column; align-items:center; justify-content:center; position:relative;}
  .stage.active{display:flex;}

  /* ---- intro ---- */
  #intro h1{font-size:28px; letter-spacing:2px; color:var(--gold-soft); font-weight:300;}
  #intro p{color:var(--muted); margin-top:10px; font-size:14px;}
  #intro{text-align:center;}
  .startBtn{
    margin-top:30px; padding:14px 40px; background:linear-gradient(135deg,var(--gold),#a8842c);
    border:none; border-radius:30px; color:#111; font-size:15px; letter-spacing:1px; cursor:pointer;
    font-weight:600; transition:transform .2s, box-shadow .2s;
  }
  .startBtn:hover{transform:translateY(-2px); box-shadow:0 10px 25px rgba(212,175,55,.3);}
  .startBtn:disabled{opacity:.4; cursor:not-allowed; transform:none; box-shadow:none;}

  /* ---- camera wrap shared ---- */
  .camWrap{position:relative; width:min(92vw, 640px); aspect-ratio:4/3; border-radius:20px; overflow:hidden; background:#000; border:1px solid var(--line);}
  video, canvas{position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover;}
  video{transform:scaleX(-1);}
  canvas{transform:scaleX(-1); pointer-events:none;}

  /* ---- scan stage ---- */
  #scanTitle{margin-bottom:16px; font-size:18px; color:var(--gold-soft); letter-spacing:1px; font-weight:300;}
  #scanHint{margin-top:14px; color:var(--muted); font-size:13px; text-align:center; max-width:90%;}
  .progressTrack{margin-top:18px; width:min(92vw,640px); height:6px; background:#222; border-radius:6px; overflow:hidden;}
  .progressFill{height:100%; width:0%; background:linear-gradient(90deg,var(--gold),var(--gold-soft)); transition:width .15s;}
  .arrowRow{display:flex; gap:30px; margin-top:14px; font-size:13px; color:var(--muted);}
  .arrowRow span.lit{color:var(--gold-soft); font-weight:600;}
  #scanCheck{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.55); opacity:0; transition:opacity .3s; border-radius:20px;}

  /* HUD-style corner brackets + glow for the scan camera frame */
  #scanCamWrap{box-shadow:0 0 0 1px rgba(212,175,55,.15), 0 0 40px rgba(212,175,55,.08);}
  #scanCamWrap .hudCorner{position:absolute; width:26px; height:26px; border:2px solid var(--gold-soft); opacity:.85; z-index:5;}
  #scanCamWrap .hudCorner.tl{top:10px; left:10px; border-right:none; border-bottom:none;}
  #scanCamWrap .hudCorner.tr{top:10px; right:10px; border-left:none; border-bottom:none;}
  #scanCamWrap .hudCorner.bl{bottom:10px; left:10px; border-right:none; border-top:none;}
  #scanCamWrap .hudCorner.br{bottom:10px; right:10px; border-left:none; border-top:none;}
  #scanStatusPill{
    position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:5;
    background:rgba(0,0,0,.55); border:1px solid rgba(212,175,55,.4); color:var(--gold-soft);
    font-size:11px; letter-spacing:1px; padding:5px 14px; border-radius:20px;
  }
  #scanStatusPill .dot{display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--gold-soft); margin-right:6px; animation:pulseDot 1.1s infinite;}
  @keyframes pulseDot{0%,100%{opacity:1;} 50%{opacity:.25;}}
  #scanCheck.show{opacity:1;}
  #scanCheck svg{width:90px; height:90px;}

  /* ---- category / list stages ---- */
  .pageTitle{font-size:18px; color:var(--gold-soft); margin-bottom:18px; letter-spacing:1px; font-weight:300; text-align:center;}
  .backRow{width:min(92vw,760px); display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .backBtn{background:none; border:1px solid var(--line); color:var(--muted); padding:7px 16px; border-radius:20px; font-size:12px; cursor:pointer;}
  .backBtn:hover{border-color:var(--gold); color:var(--gold-soft);}

  #faceResultCard{
    width:min(92vw,520px); background:var(--panel); border:1px solid var(--line); border-radius:18px;
    padding:28px 24px; text-align:center;
  }
  #faceShapeName{font-size:24px; color:var(--gold-soft); letter-spacing:1px; font-weight:300; margin-bottom:10px;}
  #faceShapeDesc{font-size:13px; color:var(--muted); line-height:1.7;}
  .catGrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; width:min(92vw,760px);}
  .catCard{
    background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:24px 10px;
    display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; transition:.2s;
  }
  .catCard:hover{border-color:var(--gold); transform:translateY(-3px);}
  .catCard .catName{font-size:15px; letter-spacing:1.5px; font-weight:600; color:var(--text);}
  .catCard .catCount{font-size:11px; color:var(--muted);}
  .catIcon{width:46px; height:20px;}

  .frameGrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:14px; width:min(92vw,760px); margin-bottom:24px;}
  .frameCard{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; min-height:110px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:.2s; padding:10px;
  }
  .frameCard:hover{border-color:var(--gold); transform:translateY(-3px);}
  .frameCard.sel{border-color:var(--gold-soft); box-shadow:0 0 0 1px var(--gold-soft) inset;}
  .frameCard svg{width:70px; height:30px;}
  .frameCard .fname{margin-top:8px; font-size:11px; color:var(--muted); text-align:center;}
  .addCard{border-style:dashed; color:var(--muted); font-size:28px; font-weight:300;}
  .addCard:hover{color:var(--gold-soft);}
  .tryBtn{margin-top:6px;}
  .deleteBtn{
    position:absolute; top:6px; right:6px; width:22px; height:22px; border-radius:50%;
    background:rgba(0,0,0,.5); border:1px solid var(--line); color:var(--muted);
    font-size:14px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .deleteBtn:hover{color:#ff6b6b; border-color:#ff6b6b;}

  .catTabs{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:90vw; margin-bottom:6px;}
  .catTab{
    background:var(--panel); border:1px solid var(--line); color:var(--muted); padding:6px 14px;
    border-radius:16px; font-size:12px; cursor:pointer; letter-spacing:.5px;
  }
  .catTab:hover{border-color:var(--gold);}
  .catTab.sel{border-color:var(--gold-soft); color:var(--gold-soft); background:#fbf3df;}

  /* ---- add frame modal ---- */
  #addModal{position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:50;}
  #addModal.show{display:flex;}
  .modalBox{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:26px; width:min(90vw,360px);}
  .modalBox h3{color:var(--gold-soft); font-size:16px; margin-bottom:16px; font-weight:400; letter-spacing:1px;}
  .modalBox label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px; margin-top:14px;}
  .modalBox input[type=text]{width:100%; background:#ffffff; border:1px solid var(--line); border-radius:8px; padding:9px 12px; color:var(--text); font-size:13px;}
  .modalBox select{width:100%; background:#ffffff; border:1px solid var(--line); border-radius:8px; padding:9px 12px; color:var(--text); font-size:13px;}
  .modalBox input[type=color]{width:46px; height:32px; border:none; background:none; cursor:pointer; vertical-align:middle;}
  .modalRow{display:flex; gap:10px; margin-top:22px;}
  .modalRow button{flex:1; padding:10px; border-radius:20px; font-size:13px; cursor:pointer; border:none;}
  .modalCancel{background:#e8e8e8; color:var(--muted);}
  .modalSave{background:linear-gradient(135deg,var(--gold),#a8842c); color:#111; font-weight:600;}

  /* ---- tryon stage ---- */
  #tryonTop{display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:12px;}
  #tryonTop .label{font-size:13px; color:var(--muted);}
  .thumbRow{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:90vw;}
  .thumb{
    width:54px; height:42px; background:var(--panel); border:1px solid var(--line); border-radius:8px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .thumb.sel{border-color:var(--gold-soft);}
  .thumb svg{width:38px; height:16px;}
  #restartBtn{margin-top:16px; background:none; border:1px solid var(--line); color:var(--muted); padding:8px 20px; border-radius:20px; font-size:12px; cursor:pointer;}
  #restartBtn:hover{border-color:var(--gold); color:var(--gold-soft);}
  #sizeRow{display:flex; align-items:center; gap:10px; margin-top:14px; width:min(92vw,640px);}
  #sizeRow .label{font-size:12px; color:var(--muted); white-space:nowrap;}
  #sizeRow input[type=range]{flex:1; accent-color:var(--gold);}
  #sizeValue{font-size:12px; color:var(--gold-soft); width:42px; text-align:right;}

  /* ---- tryon two-column layout + compare panel ---- */
  #tryonLayout{display:flex; gap:28px; align-items:flex-start; justify-content:center; width:100%; flex-wrap:wrap;}
  #tryonMain{display:flex; flex-direction:column; align-items:center;}
  #comparePanel{
    width:170px; display:flex; flex-direction:column; align-items:stretch; gap:10px;
    padding-top:44px;
  }
  #comparePanel .label{font-size:13px; color:var(--muted); text-align:center;}
  #captureBtn{
    background:var(--panel); border:1px solid var(--line); color:var(--text); padding:9px 10px;
    border-radius:20px; font-size:13px; cursor:pointer;
  }
  #captureBtn:hover{border-color:var(--gold); color:var(--gold-soft);}
  #captureList{display:flex; flex-direction:column; gap:8px; max-height:420px; overflow-y:auto; padding:2px;}
  .captureThumb{
    position:relative; border:2px solid var(--line); border-radius:10px; overflow:hidden; cursor:pointer;
    background:var(--panel);
  }
  .captureThumb img{width:100%; display:block; transform:scaleX(-1);}
  .captureThumb.sel{border-color:var(--gold-soft); box-shadow:0 0 0 1px var(--gold-soft);}
  .captureThumb .capLabel{
    position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,.55); color:#fff;
    font-size:10px; padding:3px 4px; text-align:center; letter-spacing:.3px;
  }
  .captureThumb .capDel{
    position:absolute; top:3px; right:3px; width:18px; height:18px; border-radius:50%;
    background:rgba(0,0,0,.55); color:#fff; font-size:11px; line-height:1; display:flex;
    align-items:center; justify-content:center; cursor:pointer;
  }
  .captureThumb .capDel:hover{background:#ff6b6b;}
  #compareBtn{
    background:linear-gradient(135deg,var(--gold),#a8842c); border:none; color:#111; font-weight:600;
    padding:9px 10px; border-radius:20px; font-size:13px; cursor:pointer;
  }
  #compareBtn:disabled{opacity:.4; cursor:not-allowed;}
  #compareHint{font-size:11px; color:var(--muted); text-align:center;}

  #compareModal{position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:60; padding:20px;}
  #compareModal.show{display:flex;}
  .compareModalBox{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:24px; width:min(94vw,720px); max-height:90vh; overflow-y:auto;}
  .compareModalBox h3{color:var(--gold-soft); font-size:16px; margin-bottom:16px; font-weight:400; letter-spacing:1px; text-align:center;}
  .compareImgs{display:flex; gap:14px; justify-content:center; flex-wrap:wrap;}
  .compareImgCol{flex:1; min-width:200px; max-width:330px;}
  .compareImgCol img{width:100%; border-radius:12px; border:1px solid var(--line); display:block;}
  .compareLabel{text-align:center; font-size:12px; color:var(--muted); margin-top:8px;}

  #guidePanel{
    width:340px; display:flex; flex-direction:column; align-items:stretch; gap:8px; padding-top:44px;
  }
  #guidePanel .label{font-size:13px; color:var(--muted); text-align:center;}
  #faceGuideImg{
    width:100%; max-height:none; object-fit:contain; border-radius:14px; border:1px solid var(--line);
    background:#fff; cursor:zoom-in;
  }
  #fitBadge{position:absolute; bottom:14px; left:14px; background:rgba(0,0,0,.55); padding:6px 12px; border-radius:20px; font-size:11px; color:var(--gold-soft); letter-spacing:.5px;}
  #loadingMsg{color:var(--muted); font-size:13px; margin-top:14px;}
</style>
</head>
<body>
<div id="app">

  <!-- INTRO -->
  <div class="stage active" id="intro">
    <h1>虚拟试戴眼镜</h1>
    <p>先扫描脸部,再选择喜欢的镜框,实时跟随你的脸部移动</p>
    <button class="startBtn" id="startBtn">开始扫描</button>
    <p id="loadingMsg"></p>
  </div>

  <!-- SCAN -->
  <div class="stage" id="scan">
    <div id="scanTitle">请把头慢慢转向 左边 → 中间 → 右边</div>
    <div class="camWrap" id="scanCamWrap">
      <video id="scanVideo" autoplay playsinline muted></video>
      <canvas id="scanCanvas"></canvas>
      <div id="scanStatusPill"><span class="dot"></span>SCANNING</div>
      <div class="hudCorner tl"></div>
      <div class="hudCorner tr"></div>
      <div class="hudCorner bl"></div>
      <div class="hudCorner br"></div>
      <div id="scanCheck"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="#d4af37" stroke-width="1.5"/><path d="M7 12.5l3 3 7-7" stroke="#e8c96a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
    <div class="progressTrack"><div class="progressFill" id="scanProgress"></div></div>
    <div class="arrowRow">
      <span id="lblLeft">← 左</span><span id="lblMid">中</span><span id="lblRight">右 →</span>
    </div>
    <div id="scanHint">将脸保持在框内,缓慢转动头部即可</div>
  </div>

  <!-- FACE SHAPE RESULT -->
  <div class="stage" id="faceResult">
    <div class="pageTitle">脸型分析结果</div>
    <div id="faceResultCard">
      <div id="faceShapeName">分析中...</div>
      <div id="faceShapeDesc"></div>
    </div>
    <div class="pageTitle" style="font-size:14px; margin-top:24px;">为你推荐的镜框形状</div>
    <div class="frameGrid" id="recommendGrid" style="margin-bottom:10px;"></div>

    <button class="startBtn" id="continueToCatBtn" style="margin-top:24px;">继续选镜框</button>
  </div>

  <!-- CATEGORY LIST -->
  <div class="stage" id="catStage">
    <div class="pageTitle">选择镜框系列</div>
    <div class="catGrid" id="catGrid"></div>
  </div>

  <!-- FRAME LIST (inside a category) -->
  <div class="stage" id="frameStage">
    <div class="backRow">
      <button class="backBtn" id="backToCat">← 返回系列</button>
      <span class="pageTitle" id="frameStageTitle" style="margin:0;"></span>
      <span style="width:70px;"></span>
    </div>
    <div class="frameGrid" id="frameGrid"></div>
    <button class="startBtn tryBtn" id="tryBtn" disabled>戴上试试</button>
  </div>

  <!-- TRYON -->
  <div class="stage" id="tryon">
    <div id="tryonLayout">
      <div id="comparePanel">
        <div class="label" style="margin-bottom:8px;">拍照对比</div>
        <button id="captureBtn">📷 拍照</button>
        <div id="captureList"></div>
        <button id="compareBtn" disabled>对比选中的照片</button>
        <div id="compareHint">选择2张照片来对比</div>
      </div>
      <div id="tryonMain">
        <div id="tryonTop">
          <div class="catTabs" id="tryonCatTabs"></div>
          <span class="label">切换镜框:</span>
          <div class="thumbRow" id="thumbRow"></div>
        </div>
        <div class="camWrap" id="tryonCamWrap">
          <video id="tryonVideo" autoplay playsinline muted></video>
          <canvas id="tryonCanvas"></canvas>
          <div id="fitBadge">实时跟踪中</div>
        </div>
        <div id="sizeRow">
          <span class="label">镜框大小</span>
          <input type="range" id="sizeSlider" min="0.6" max="1.6" step="0.02" value="1">
          <span id="sizeValue">100%</span>
        </div>
        <button id="restartBtn">重新扫描</button>
      </div>
      <div id="guidePanel">

<!-- COMPARE MODAL -->
<div id="compareModal">
  <div class="compareModalBox">
    <h3>照片对比</h3>
    <div class="compareImgs">
      <div class="compareImgCol"><img id="compareImgA"><div id="compareLabelA" class="compareLabel"></div></div>
      <div class="compareImgCol"><img id="compareImgB"><div id="compareLabelB" class="compareLabel"></div></div>
    </div>
    <button id="closeCompareBtn" class="modalCancel" style="margin-top:18px; padding:10px; border-radius:20px; width:100%; cursor:pointer; border:none;">关闭</button>
  </div>
</div>

<!-- ADD FRAME MODAL -->
<div id="addModal">
  <div class="modalBox">
    <h3>添加新镜框</h3>
    <label>镜框名称</label>
    <input type="text" id="newFrameName" placeholder="例如 Voyager">
    <label>镜框图片（建议透明背景PNG）</label>
    <input type="file" id="newFrameImageFront" accept="image/*">
    <div id="newFrameFrontPreviewWrap" style="display:none; margin-top:10px; text-align:center;">
      <img id="newFrameFrontPreview" style="max-width:100%; max-height:80px;">
    </div>
    <div id="shapeFieldsWrap">
      <label>外形(没有上传图片时使用)</label>
      <select id="newFrameShape">
        <option value="round">圆框</option>
        <option value="square">方框</option>
        <option value="cat">猫眼框</option>
        <option value="thin">金属细框</option>
      </select>
      <label>颜色（没有上传图片时使用）</label>
      <input type="color" id="newFrameColor" value="#1a1a1a">
      <label>初始大小</label>
      <select id="newFrameScale">
        <option value="0.85">小一点</option>
        <option value="1" selected>标准</option>
        <option value="1.15">大一点</option>
      </select>
    </div>
    <div class="modalRow">
      <button class="modalCancel" id="modalCancelBtn">取消</button>
      <button class="modalSave" id="modalSaveBtn">添加</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
(function(){

/* ---------------------------------------------------------- */
/* Shape draw functions — procedural so no image assets needed */
/* ---------------------------------------------------------- */
function drawRound(ctx,w,thick,color){
  const lensR = w*0.165, gap = w*0.075;
  ctx.strokeStyle=color; ctx.lineWidth=thick; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(-gap-lensR, 0, lensR, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc( gap+lensR, 0, lensR, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-gap,0); ctx.quadraticCurveTo(0,-thick*1.4,gap,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-gap-lensR*2,0); ctx.lineTo(-gap-lensR*2-w*0.12,-w*0.01); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( gap+lensR*2,0); ctx.lineTo( gap+lensR*2+w*0.12,-w*0.01); ctx.stroke();
}
function drawSquare(ctx,w,thick,color){
  const lw=w*0.30, lh=w*0.20, gap=w*0.06, r=w*0.035;
  ctx.strokeStyle=color; ctx.lineWidth=thick; ctx.lineJoin='round';
  roundRect(ctx, -gap-lw, -lh/2, lw, lh, r); ctx.stroke();
  roundRect(ctx,  gap,    -lh/2, lw, lh, r); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-gap,0); ctx.lineTo(gap,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-gap-lw,0); ctx.lineTo(-gap-lw-w*0.12,-w*0.01); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( gap+lw,0); ctx.lineTo( gap+lw+w*0.12,-w*0.01); ctx.stroke();
}
function drawCat(ctx,w,thick,color){
  const lw=w*0.28, lh=w*0.17, gap=w*0.06;
  ctx.strokeStyle=color; ctx.lineWidth=thick; ctx.lineJoin='round'; ctx.lineCap='round';
  [-1,1].forEach(s=>{
    ctx.beginPath();
    const x0=s*gap, x1=s*(gap+lw);
    ctx.moveTo(x0,lh*0.35);
    ctx.quadraticCurveTo(s*(gap+lw*0.3), -lh*0.95, x1, -lh*0.55);
    ctx.quadraticCurveTo(x1+s*w*0.02, lh*0.1, x1-s*w*0.02, lh*0.45);
    ctx.quadraticCurveTo(s*(gap+lw*0.5), lh*0.65, x0, lh*0.35);
    ctx.stroke();
  });
  ctx.beginPath(); ctx.moveTo(-gap,0); ctx.lineTo(gap,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-gap-lw,-lh*0.4); ctx.lineTo(-gap-lw-w*0.12,-lh*0.55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( gap+lw,-lh*0.4); ctx.lineTo( gap+lw+w*0.12,-lh*0.55); ctx.stroke();
}
function drawThin(ctx,w,thick,color){
  const lensR=w*0.15, gap=w*0.08;
  ctx.strokeStyle=color; ctx.lineWidth=thick*0.6; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(-gap-lensR,0,lensR,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc( gap+lensR,0,lensR,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-gap,0); ctx.lineTo(gap,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-gap-lensR*2,0); ctx.lineTo(-gap-lensR*2-w*0.12,-w*0.02); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( gap+lensR*2,0); ctx.lineTo( gap+lensR*2+w*0.12,-w*0.02); ctx.stroke();
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
const SHAPE_DRAW = { round:drawRound, square:drawSquare, cat:drawCat, thin:drawThin };

function svgPreview(shape, color){
  const c = color || '#1a1a1a';
  if(shape==='round') return `<svg viewBox="0 0 100 40"><circle cx="28" cy="20" r="14" fill="none" stroke="${c}" stroke-width="4"/><circle cx="72" cy="20" r="14" fill="none" stroke="${c}" stroke-width="4"/><line x1="42" y1="20" x2="58" y2="20" stroke="${c}" stroke-width="4"/></svg>`;
  if(shape==='square') return `<svg viewBox="0 0 100 40"><rect x="10" y="8" width="32" height="24" rx="4" fill="none" stroke="${c}" stroke-width="4"/><rect x="58" y="8" width="32" height="24" rx="4" fill="none" stroke="${c}" stroke-width="4"/><line x1="42" y1="20" x2="58" y2="20" stroke="${c}" stroke-width="4"/></svg>`;
  if(shape==='cat') return `<svg viewBox="0 0 100 40"><path d="M10 24 Q18 4 38 12 Q44 20 38 30 Q24 34 10 24Z" fill="none" stroke="${c}" stroke-width="3"/><path d="M90 24 Q82 4 62 12 Q56 20 62 30 Q76 34 90 24Z" fill="none" stroke="${c}" stroke-width="3"/><line x1="40" y1="20" x2="60" y2="20" stroke="${c}" stroke-width="3"/></svg>`;
  return `<svg viewBox="0 0 100 40"><circle cx="28" cy="20" r="13" fill="none" stroke="${c}" stroke-width="2.5"/><circle cx="72" cy="20" r="13" fill="none" stroke="${c}" stroke-width="2.5"/><line x1="41" y1="20" x2="59" y2="20" stroke="${c}" stroke-width="2.5"/></svg>`;
}

const CATEGORY_NAMES = ['LUFFY','BOLD','HIDDEN','100%','CRYAN','KINGSMAN'];
const STORE_KEY = 'eyewear_frames_v1';

function defaultFrames(){
  const seedShapes = ['round','square','cat','thin'];
  const seedColors = ['#1a1a1a','#2b2b2b','#caa14a','#3a2a1a'];
  let id=1; const out=[];
  CATEGORY_NAMES.forEach((cat,ci)=>{
    out.push({
      id:'f'+(id++),
      name: cat+' 经典款',
      category: cat,
      shape: seedShapes[ci % seedShapes.length],
      color: seedColors[ci % seedColors.length]
    });
  });
  return out;
}

function loadFrames(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ return JSON.parse(raw); }
  }catch(e){}
  const d = defaultFrames();
  saveFrames(d);
  return d;
}
function saveFrames(frames){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(frames)); }catch(e){}
}

function buildFrameGrid(){
  const grid = $('frameGrid');
  grid.innerHTML='';
  const list = FRAMES.filter(f=>f.category===currentCategory);
  list.forEach(f=>{
    const card = document.createElement('div');
    card.className='frameCard'+(f.id===selectedFrameId?' sel':'');
    card.style.position='relative';
    const visual = f.image ? `<img src="${f.image}" style="max-width:80px; max-height:34px; object-fit:contain;">` : svgPreview(f.shape, f.color);
    card.innerHTML = visual + `<div class="fname">${f.name}</div><button class="deleteBtn" title="删除">×</button>`;
    card.onclick = ()=>{
      selectedFrameId = f.id;
      document.querySelectorAll('.frameCard').forEach(c=>c.classList.remove('sel'));
      card.classList.add('sel');
      $('tryBtn').disabled = false;
    };
    card.querySelector('.deleteBtn').onclick = (e)=>{
      e.stopPropagation();
      if(!confirm('确定要删除「'+f.name+'」吗？')) return;
      FRAMES = FRAMES.filter(x=>x.id!==f.id);
      saveFrames(FRAMES);
      delete imgCache[f.id+'_f'];
      delete imgCache[f.id+'_s'];
      if(selectedFrameId===f.id) selectedFrameId=null;
      buildFrameGrid();
      buildCatGrid();
      $('tryBtn').disabled = !selectedFrameId;
    };
    grid.appendChild(card);
  });

  addCard.className='frameCard addCard';

      document.querySelectorAll('.thumb').forEach(c=>c.classList.remove('sel'));
      t.classList.add('sel');
      syncSizeSlider();

    row.appendChild(t);

  syncSizeSlider();

function syncSizeSlider(){
  const slider = $('sizeSlider');
  if(!slider) return;
  const frame = FRAMES.find(f=>f.id===selectedFrameId);
  const scale = (frame && frame.scale) || 1;
  slider.value = scale;
  $('sizeValue').textContent = Math.round(scale*100)+'%';

/* ---------------------------------------------------------- */
/* Camera + FaceMesh wiring                                     */
/* ---------------------------------------------------------- */
let currentStream = null;
async function startCamera(videoEl){
  const stream = await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}, audio:false});
  videoEl.srcObject = stream;
  currentStream = stream;
  await new Promise(r=>{ videoEl.onloadedmetadata = ()=>r(); });
  return stream;
}
function stopCamera(){
  if(currentStream){ currentStream.getTracks().forEach(t=>t.stop()); currentStream=null; }
}
function createFaceMesh(onResults){
  const fm = new FaceMesh({locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
  fm.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.6, minTrackingConfidence:0.6});
  fm.onResults(onResults);
  return fm;
}
function estimateYaw(landmarks){
  const nose = landmarks[1], left = landmarks[234], right = landmarks[454];
  const dLeft = Math.hypot(nose.x-left.x, nose.y-left.y);
  const dRight = Math.hypot(nose.x-right.x, nose.y-right.y);
  return (dRight - dLeft) / (dRight + dLeft);
}

/* SCAN STAGE                                                   */
/* ---------------------------------------------------------- */
let scanCoverage = {left:false, mid:false, right:false};
let scanFaceMesh, scanCtx, scanRunning=false;
let capturedMidLandmarks = null;
let capturedVideoSize = {w:640,h:480};

async function runScan(){
  goTo('scan');
  scanCoverage = {left:false, mid:false, right:false};
  capturedMidLandmarks = null;
  updateScanUI();
  const video = $('scanVideo');
  const canvas = $('scanCanvas');
  await startCamera(video);
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  capturedVideoSize = {w:canvas.width, h:canvas.height};
  scanCtx = canvas.getContext('2d');
  scanRunning = true;
  scanFaceMesh = createFaceMesh(onScanResults);
  async function loop(){
    if(!scanRunning) return;
    await scanFaceMesh.send({image: video});
    requestAnimationFrame(loop);
  }
  loop();
}
function onScanResults(results){
  const canvas=$('scanCanvas');
  scanCtx.clearRect(0,0,canvas.width,canvas.height);
  if(!results.multiFaceLandmarks || !results.multiFaceLandmarks.length){
    $('scanHint').textContent = '没有检测到脸,请正对摄像头';
    return;
  }
  const lm = results.multiFaceLandmarks[0];
  drawFaceMeshHUD(scanCtx, lm, canvas.width, canvas.height);
  const yaw = estimateYaw(lm);
  if(yaw < -0.06) scanCoverage.left = true;
  if(yaw > -0.04 && yaw < 0.04){
    scanCoverage.mid = true;
    capturedMidLandmarks = lm.map(p=>({x:p.x,y:p.y,z:p.z})); // snapshot the most front-facing frame
  }
  if(yaw > 0.06) scanCoverage.right = true;
  updateScanUI();
  if(scanCoverage.left && scanCoverage.mid && scanCoverage.right) finishScan();
}

/* ---- premium-looking 3D wireframe scan overlay ---- */
function drawFaceMeshHUD(ctx, lm, w, h){
  const pts = lm.map(p=>({x:p.x*w, y:p.y*h, z:p.z}));
  // z is roughly negative toward the camera; normalize to 0..1 for depth shading
  let minZ=Infinity, maxZ=-Infinity;
  for(const p of pts){ if(p.z<minZ) minZ=p.z; if(p.z>maxZ) maxZ=p.z; }
  const zRange = (maxZ-minZ) || 1;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  // mesh wireframe (uses the tessellation connection list shipped with @mediapipe/face_mesh)
  const connections = (typeof FACEMESH_TESSELATION !== 'undefined') ? FACEMESH_TESSELATION : null;
  if(connections){
    ctx.lineWidth = 1;
    for(const [a,b] of connections){
      const pa = pts[a], pb = pts[b];
      const depth = 1 - ((pa.z+pb.z)/2 - minZ)/zRange; // closer to camera -> brighter
      ctx.strokeStyle = `rgba(232,201,106,${0.08 + depth*0.32})`;
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    }
  }

  // glowing landmark points, brighter when closer to the camera
  for(let i=0;i<pts.length;i+=2){
    const p = pts[i];
    const depth = 1 - (p.z - minZ)/zRange;
    const r = 0.8 + depth*1.4;
    ctx.beginPath();
    ctx.fillStyle = `rgba(212,175,55,${0.25 + depth*0.5})`;
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fill();
  }

  // face oval outline, slightly thicker + glowing
  const ovalIdx = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
  ctx.beginPath();
  ovalIdx.forEach((idx,i)=>{
    const p = pts[idx];
    if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);
  });
  ctx.closePath();
  ctx.strokeStyle = 'rgba(232,201,106,0.55)';
  ctx.lineWidth = 1.4;
  ctx.stroke();

  ctx.restore();

  // animated sweeping scan line across the face bounding box
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for(const idx of ovalIdx){
    const p = pts[idx];
    if(p.x<minX) minX=p.x; if(p.x>maxX) maxX=p.x;
    if(p.y<minY) minY=p.y; if(p.y>maxY) maxY=p.y;
  }
  const period = 1800;
  const t = (performance.now() % period) / period;
  const sweepY = minY + (maxY-minY) * t;
  const grad = ctx.createLinearGradient(0, sweepY-14, 0, sweepY+14);
  grad.addColorStop(0, 'rgba(232,201,106,0)');
  grad.addColorStop(0.5, 'rgba(232,201,106,0.55)');
  grad.addColorStop(1, 'rgba(232,201,106,0)');
  ctx.save();
  ctx.fillStyle = grad;
  ctx.fillRect(minX-10, sweepY-14, (maxX-minX)+20, 28);
  ctx.restore();
}

function updateScanUI(){
  const done = [scanCoverage.left,scanCoverage.mid,scanCoverage.right].filter(Boolean).length;
  $('scanProgress').style.width = (done/3*100)+'%';
  $('lblLeft').classList.toggle('lit', scanCoverage.left);
  $('lblMid').classList.toggle('lit', scanCoverage.mid);
  $('lblRight').classList.toggle('lit', scanCoverage.right);
  if(done<3) $('scanHint').textContent = '将脸保持在框内,缓慢转动头部即可';
}
function finishScan(){
  scanRunning = false;
  $('scanCheck').classList.add('show');
  setTimeout(()=>{
    stopCamera();
    $('scanCheck').classList.remove('show');
    buildCatGrid();
    goTo('catStage');
  }, 900);
}

/* ---------------------------------------------------------- */
/* FACE SHAPE ANALYSIS                                          */
/* ---------------------------------------------------------- */
const FACE_SHAPES = {
  round:  { name:'圆形脸',  desc:'脸长和脸宽比例接近，下颌线条圆润柔和。适合用有棱角的镜框拉出脸部线条感。', recommend:['square','cat'] },
  square: { name:'方形脸',  desc:'下颌线条分明、额头与下颌宽度接近。适合圆润的镜框来柔和脸部轮廓。', recommend:['round','cat'] },
  heart:  { name:'心形脸',  desc:'额头较宽、下颌较窄尖。适合下宽上窄或细框，避免镜框上半部太夸张。', recommend:['round','thin'] },
  oval:   { name:'椭圆形脸', desc:'比例均衡，几乎任何镜框形状都适合，是最容易挑选眼镜的脸型。', recommend:['round','square','thin'] },
  long:   { name:'长形脸',  desc:'脸长明显大于脸宽。适合镜框偏宽、偏圆，能在视觉上缩短脸型比例。', recommend:['round','square'] }
};
const SHAPE_LABEL = { round:'圆框', square:'方框', cat:'猫眼框', thin:'金属细框' };

function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

function analyzeFaceShape(lm, vw, vh){
  // convert normalized coords to pixel space so ratios reflect real proportions
  const px = i => ({ x: lm[i].x*vw, y: lm[i].y*vh });
  const top = px(10), chin = px(152);
  const cheekL = px(234), cheekR = px(454);
  const jawL = px(58), jawR = px(288);
  const foreheadL = px(67), foreheadR = px(297);

  const faceHeight = dist(top, chin);
  const faceWidth = dist(cheekL, cheekR);
  const jawWidth = dist(jawL, jawR);
  const foreheadWidth = dist(foreheadL, foreheadR);

  const hwRatio = faceHeight / faceWidth;
  const jawToCheek = jawWidth / faceWidth;
  const foreheadToCheek = foreheadWidth / faceWidth;

  let shapeId = 'oval';
  if(hwRatio > 1.62){
    shapeId = 'long';
  } else if(foreheadToCheek - jawToCheek > 0.12){
    shapeId = 'heart';
  } else if(jawToCheek > 0.93 && foreheadToCheek > 0.9 && hwRatio < 1.35){
    shapeId = 'square';
  } else if(hwRatio < 1.3 && jawToCheek > 0.85){
    shapeId = 'round';
  }
  return shapeId;
}

function buildRecommendGrid(shapeId){
  const grid = $('recommendGrid');
  grid.innerHTML='';
  const info = FACE_SHAPES[shapeId];
  info.recommend.forEach(shape=>{
    const card = document.createElement('div');
    card.className='frameCard';
    card.style.cursor='default';
    card.innerHTML = svgPreview(shape,'#caa14a') + `<div class="fname">${SHAPE_LABEL[shape]}</div>`;
    grid.appendChild(card);
  });
}

function showFaceResult(){
  let shapeId = 'oval';
  if(capturedMidLandmarks){
    shapeId = analyzeFaceShape(capturedMidLandmarks, capturedVideoSize.w, capturedVideoSize.h);
  }
  const info = FACE_SHAPES[shapeId];
  $('faceShapeName').textContent = info.name;
  $('faceShapeDesc').textContent = info.desc + '（此结果为大致估算，仅供参考）';
  buildRecommendGrid(shapeId);
}

/* ---------------------------------------------------------- */
/* TRYON STAGE — track glasses on live face                     */
/* ---------------------------------------------------------- */
let tryonFaceMesh, tryonCtx, tryonRunning=false;
const imgCache = {};
function getImg(src, cacheKey){
  if(!src) return null;
  if(imgCache[cacheKey]) return imgCache[cacheKey];
  const img = new Image();
  img.src = src;
  imgCache[cacheKey] = img;
  return img;
}

async function runTryon(){
  goTo('tryon');
  buildCatTabsInTryon();
  buildThumbRow();
  const video = $('tryonVideo');
  const canvas = $('tryonCanvas');
  await startCamera(video);
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  tryonCtx = canvas.getContext('2d');
  tryonRunning = true;
  tryonFaceMesh = createFaceMesh(onTryonResults);
  async function loop(){
    if(!tryonRunning) return;
    await tryonFaceMesh.send({image: video});
    requestAnimationFrame(loop);
  }
  loop();
}

function onTryonResults(results){
  const canvas=$('tryonCanvas');
  tryonCtx.clearRect(0,0,canvas.width,canvas.height);
  if(!results.multiFaceLandmarks || !results.multiFaceLandmarks.length) return;
  const lm = results.multiFaceLandmarks[0];
  const leftEyeOuter = lm[33], rightEyeOuter = lm[263];
  const toPx = p => ({x: p.x*canvas.width, y: p.y*canvas.height});
  const pL = toPx(leftEyeOuter), pR = toPx(rightEyeOuter);
  const cx = (pL.x+pR.x)/2, cy = (pL.y+pR.y)/2;
  const eyeDist = Math.hypot(pR.x-pL.x, pR.y-pL.y);
  const angle = Math.atan2(pR.y-pL.y, pR.x-pL.x);

  const frame = FRAMES.find(f=>f.id===selectedFrameId) || FRAMES[0];
  const scale = (frame && frame.scale) || 1;
  const glassesWidth = eyeDist * 2.1 * scale;
  const thickness = Math.max(2.2, eyeDist*0.045*scale);

  tryonCtx.save();
  tryonCtx.translate(cx, cy + eyeDist*0.04);
  tryonCtx.rotate(angle);

  const img = getImg(frame.image, frame.id+'_f');
  const imgReady = img && img.complete && img.naturalWidth>0;

  if(imgReady){
    const drawW = glassesWidth;
    const drawH = drawW * (img.naturalHeight/img.naturalWidth);
    tryonCtx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
  } else {
    const drawFn = SHAPE_DRAW[frame.shape] || drawRound;
    drawFn(tryonCtx, glassesWidth, thickness, frame.color);
  }
  tryonCtx.restore();
}

/* ---------------------------------------------------------- */
/* CAPTURE & COMPARE                                             */
/* ---------------------------------------------------------- */
let captures = [];
let selectedCaptureIds = [];

function capturePhoto(){
  const video = $('tryonVideo');
  const canvas = $('tryonCanvas');
  if(!video.videoWidth) return;
  const off = document.createElement('canvas');
  off.width = video.videoWidth;
  off.height = video.videoHeight;
  const octx = off.getContext('2d');
  // mirror to match what the user sees on screen
  octx.translate(off.width, 0);
  octx.scale(-1, 1);
  octx.drawImage(video, 0, 0, off.width, off.height);
  octx.drawImage(canvas, 0, 0, off.width, off.height);
  const frame = FRAMES.find(f=>f.id===selectedFrameId);
  const cap = {
    id: 'cap_' + Date.now() + '_' + Math.floor(Math.random()*1000),
    dataUrl: off.toDataURL('image/jpeg', 0.92),
    label: frame ? frame.name : '未戴镜框',
    time: new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'})
  };
  captures.unshift(cap);
  renderCaptureList();
}

function renderCaptureList(){
  const list = $('captureList');
  list.innerHTML = '';
  captures.forEach(cap=>{
    const item = document.createElement('div');
    item.className = 'captureThumb' + (selectedCaptureIds.includes(cap.id) ? ' sel' : '');
    item.innerHTML = `
      <img src="${cap.dataUrl}">
      <div class="capLabel">${cap.label} · ${cap.time}</div>
      <div class="capDel">×</div>
    `;
    item.querySelector('img').onclick = ()=> toggleCaptureSelect(cap.id);
    item.querySelector('.capLabel').onclick = ()=> toggleCaptureSelect(cap.id);
    item.querySelector('.capDel').onclick = (e)=>{
      e.stopPropagation();
      captures = captures.filter(c=>c.id!==cap.id);
      selectedCaptureIds = selectedCaptureIds.filter(id=>id!==cap.id);
      renderCaptureList();
    };
    list.appendChild(item);
  });
  updateCompareBtn();
}

function toggleCaptureSelect(id){
  if(selectedCaptureIds.includes(id)){
    selectedCaptureIds = selectedCaptureIds.filter(x=>x!==id);
  } else {
    if(selectedCaptureIds.length >= 2) selectedCaptureIds.shift();
    selectedCaptureIds.push(id);
  }
  renderCaptureList();
}

function updateCompareBtn(){
  const btn = $('compareBtn');
  btn.disabled = selectedCaptureIds.length !== 2;
  $('compareHint').textContent = selectedCaptureIds.length === 2
    ? '已选 2 张,点击对比'
    : `选择2张照片来对比 (${selectedCaptureIds.length}/2)`;
}

function openCompare(){
  if(selectedCaptureIds.length !== 2) return;
  const [a, b] = selectedCaptureIds.map(id => captures.find(c=>c.id===id));
  $('compareImgA').src = a.dataUrl;
  $('compareImgB').src = b.dataUrl;
  $('compareLabelA').textContent = a.label + ' · ' + a.time;
  $('compareLabelB').textContent = b.label + ' · ' + b.time;
  $('compareModal').classList.add('show');
}

$('captureBtn').onclick = capturePhoto;
$('compareBtn').onclick = openCompare;
$('closeCompareBtn').onclick = ()=> $('compareModal').classList.remove('show');

$('faceGuideImg').onclick = ()=>{
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center; z-index:70; padding:20px; cursor:zoom-out;';
  modal.innerHTML = `<img src="${$('faceGuideImg').src}" style="max-width:95vw; max-height:95vh; border-radius:10px;">`;
  modal.onclick = ()=> modal.remove();
  document.body.appendChild(modal);
};

/* ---------------------------------------------------------- */
/* Event wiring                                                 */
/* ---------------------------------------------------------- */
$('startBtn').onclick = async ()=>{
  $('loadingMsg').textContent = '正在打开摄像头...';
  try{
    await runScan();
    $('loadingMsg').textContent='';
  }catch(e){
    $('loadingMsg').textContent = '无法访问摄像头,请检查浏览器权限: '+e.message;
  }
};
$('tryBtn').onclick = ()=>{ if(selectedFrameId) runTryon(); };
$('restartBtn').onclick = ()=>{
  tryonRunning = false;
  stopCamera();
  goTo('intro');
};
window.addEventListener('beforeunload', stopCamera);

})();
</script>
